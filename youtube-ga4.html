<script>
  // Load YouTube IFrame API
  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  var players = [];

  function onYouTubeIframeAPIReady() {
    document.querySelectorAll('.yt-video').forEach((iframe, i) => {
      players[i] = new YT.Player(iframe, {
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    });
  }

  function onPlayerStateChange(event) {
    const map = {
      1: 'play',
      2: 'pause',
      0: 'ended'
    };

    if (!map[event.data]) return;

    gtag('event', 'youtube_' + map[event.data], {
      video_id: event.target.getVideoData().video_id,
      video_title: event.target.getVideoData().title,
      page_path: location.pathname
    });
  }
</script>
